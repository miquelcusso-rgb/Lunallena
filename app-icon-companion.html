<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="/manifest.json">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CP40DHXG3L"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  var gid = location.hostname.includes('nextfullmoon') ? 'G-V220YHYXVZ' : 'G-CP40DHXG3L';
  gtag('config', gid);
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>LUNALLENA · App Icon Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05050d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:'Cormorant Garamond',serif;color:#c4c4d8;padding:3rem 1.5rem 4rem;gap:0;}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.content{position:relative;z-index:1;width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center;gap:3.5rem;}

.page-header{text-align:center;}
.page-pre{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.45em;text-transform:uppercase;color:rgba(196,196,220,.32);margin-bottom:.6rem;}
.page-title{font-family:'Cinzel',serif;font-weight:300;font-size:clamp(1.2rem,3.5vw,1.9rem);color:#fff;letter-spacing:.04em;}

.divider{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(196,196,255,.2),transparent);}

/* LIVE COMPANION */
.live-wrap{display:flex;flex-direction:column;align-items:center;gap:1.4rem;}
.live-pre{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(196,196,220,.28);}
.live-icon-outer{
  position:relative;
  animation:float 7s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
#live-svg{
  width:clamp(100px,28vw,148px);height:clamp(100px,28vw,148px);
  filter:drop-shadow(0 0 32px rgba(196,196,255,.38)) drop-shadow(0 0 70px rgba(160,160,220,.15));
}
.live-phase{font-family:'Cinzel',serif;font-size:clamp(.72rem,1.6vw,.92rem);color:#fff;letter-spacing:.1em;text-align:center;}
.live-illum{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.82rem,1.5vw,.96rem);color:rgba(196,196,220,.42);}

/* ALL 8 PHASES */
.phases-wrap{width:100%;}
.phases-pre{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(196,196,220,.28);text-align:center;margin-bottom:1.6rem;}
.phases-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(1rem,3vw,1.8rem);justify-items:center;}
.phase-item{display:flex;flex-direction:column;align-items:center;gap:.6rem;}
.phase-item svg{
  transition:transform .35s cubic-bezier(.16,1,.3,1),filter .35s;
  filter:drop-shadow(0 0 10px rgba(196,196,255,.22));
}
.phase-item:hover svg{transform:scale(1.1) translateY(-4px);filter:drop-shadow(0 0 22px rgba(196,196,255,.55));}
.phase-label{font-family:'Cinzel',serif;font-size:clamp(.42rem,.8vw,.54rem);letter-spacing:.2em;text-transform:uppercase;color:rgba(196,196,220,.32);text-align:center;}

/* SIZE SHOWCASE */
.sizes-wrap{width:100%;}
.sizes-pre{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(196,196,220,.28);text-align:center;margin-bottom:1.4rem;}
.sizes-row{display:flex;align-items:flex-end;justify-content:center;flex-wrap:wrap;gap:1.5rem;}
.size-item{display:flex;flex-direction:column;align-items:center;gap:.45rem;}
.size-label{font-family:'Cinzel',serif;font-size:.44rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(196,196,220,.22);}

@media(max-width:500px){
  .phases-grid{grid-template-columns:repeat(4,1fr);gap:.7rem;}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">

  <div class="page-header">
    <p class="page-pre">LUNALLENA · App Icon</p>
    <h1 class="page-title">Companion lunar</h1>
  </div>

  <div class="divider"></div>

  <!-- LIVE -->
  <div class="live-wrap">
    <p class="live-pre">Fase de esta noche · En vivo</p>
    <div class="live-icon-outer">
      <svg id="live-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="lg" cx="37%" cy="35%" r="54%">
            <stop offset="0%" stop-color="#f4f4ff"/>
            <stop offset="55%" stop-color="#c4c4e8"/>
            <stop offset="100%" stop-color="#8888b8"/>
          </radialGradient>
          <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="55%" stop-color="transparent"/>
            <stop offset="100%" stop-color="rgba(180,180,255,.07)"/>
          </radialGradient>
          <clipPath id="lmc"><circle cx="60" cy="60" r="44"/></clipPath>
        </defs>
        <!-- stars -->
        <circle cx="18" cy="16" r=".9" fill="white" opacity=".6"/>
        <circle cx="96" cy="22" r=".6" fill="white" opacity=".45"/>
        <circle cx="104" cy="10" r=".7" fill="white" opacity=".35"/>
        <circle cx="12" cy="82" r=".8" fill="white" opacity=".5"/>
        <circle cx="108" cy="88" r=".6" fill="white" opacity=".38"/>
        <circle cx="22" cy="100" r=".7" fill="white" opacity=".42"/>
        <circle cx="88" cy="8" r=".5" fill="white" opacity=".28"/>
        <circle cx="8" cy="52" r=".6" fill="white" opacity=".36"/>
        <circle cx="114" cy="60" r=".7" fill="white" opacity=".3"/>
        <circle cx="50" cy="8" r=".5" fill="white" opacity=".25"/>
        <circle cx="100" cy="48" r=".6" fill="white" opacity=".3"/>
        <!-- glow -->
        <circle cx="60" cy="60" r="52" fill="url(#halo)"/>
        <!-- moon -->
        <circle cx="60" cy="60" r="44" fill="url(#lg)"/>
        <!-- craters -->
        <g clip-path="url(#lmc)" opacity="0.11">
          <circle cx="46" cy="50" r="6" fill="#666"/>
          <circle cx="70" cy="42" r="3.5" fill="#666"/>
          <circle cx="54" cy="74" r="8" fill="#666"/>
          <circle cx="78" cy="66" r="5" fill="#666"/>
          <circle cx="36" cy="70" r="3.5" fill="#666"/>
        </g>
        <!-- phase shadow -->
        <g id="live-shadow" clip-path="url(#lmc)"></g>
        <!-- rim -->
        <circle cx="60" cy="60" r="44" fill="none" stroke="rgba(196,196,255,.1)" stroke-width="1"/>
      </svg>
    </div>
    <div class="live-phase" id="live-phase-name">—</div>
    <div class="live-illum" id="live-illum-txt">Calculando…</div>
  </div>

  <div class="divider"></div>

  <!-- ALL 8 PHASES -->
  <div class="phases-wrap">
    <p class="phases-pre">Las 8 fases</p>
    <div class="phases-grid" id="phases-grid"></div>
  </div>

  <div class="divider"></div>

  <!-- SIZE SHOWCASE -->
  <div class="sizes-wrap">
    <p class="sizes-pre">Tamaños</p>
    <div class="sizes-row" id="sizes-row"></div>
  </div>

</div>

<script>
// ── LUNAR ENGINE ──
const LC=29.530588853,REF=new Date('2000-01-06T18:14:00Z');
function lunarAge(d){return(((d-REF)/86400000%LC)+LC)%LC;}
function illumPct(a){return((1-Math.cos(a/LC*2*Math.PI))/2)*100;}
function lunarPhase(a){
  if(a<1.85)  return{n:'Luna nueva',      k:'new-moon'};
  if(a<7.38)  return{n:'Creciente',       k:'waxing-crescent'};
  if(a<9.22)  return{n:'Primer cuarto',   k:'first-quarter'};
  if(a<14.77) return{n:'Gibosa creciente',k:'waxing-gibbous'};
  if(a<16.61) return{n:'Luna llena',      k:'full-moon'};
  if(a<22.15) return{n:'Gibosa menguante',k:'waning-gibbous'};
  if(a<23.99) return{n:'Último cuarto',   k:'last-quarter'};
  return       {n:'Menguante',            k:'waning-crescent'};
}

// ── SHADOW PATH ──
function shadow(a,cx,cy,r){
  const p=a/LC,wx=p<.5,t=wx?p*2:(p-.5)*2,ratio=wx?(1-2*t):(2*t-1),rx=Math.abs(ratio)*r;
  if(wx)return ratio>=0?`M${cx} ${cy-r}A${rx} ${r} 0 0 1 ${cx} ${cy+r}A${r} ${r} 0 0 1 ${cx} ${cy-r}Z`:`M${cx} ${cy-r}A${rx} ${r} 0 0 0 ${cx} ${cy+r}A${r} ${r} 0 0 1 ${cx} ${cy-r}Z`;
  return ratio>=0?`M${cx} ${cy-r}A${rx} ${r} 0 0 0 ${cx} ${cy+r}A${r} ${r} 0 0 0 ${cx} ${cy-r}Z`:`M${cx} ${cy-r}A${rx} ${r} 0 0 1 ${cx} ${cy+r}A${r} ${r} 0 0 0 ${cx} ${cy-r}Z`;
}

// ── BUILD ICON SVG (pure moon, no label, with stars) ──
function iconSVG(age,size){
  const cx=size/2,cy=size/2,r=size*.365;
  const sp=shadow(age,cx,cy,r);
  const stars=[
    [.15,.13,.0075,.6],[.8,.18,.005,.45],[.87,.08,.006,.35],
    [.1,.68,.007,.5],[.9,.73,.005,.38],[.18,.83,.006,.42],
    [.73,.07,.004,.28],[.07,.43,.005,.36],[.95,.5,.006,.3],
  ].map(([sx,sy,sr,sa])=>`<circle cx="${(sx*size).toFixed(1)}" cy="${(sy*size).toFixed(1)}" r="${(sr*size).toFixed(2)}" fill="white" opacity="${sa}"/>`).join('');
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mg${size}" cx="37%" cy="35%" r="54%">
      <stop offset="0%" stop-color="#f4f4ff"/>
      <stop offset="55%" stop-color="#c4c4e8"/>
      <stop offset="100%" stop-color="#8888b8"/>
    </radialGradient>
    <radialGradient id="halo${size}" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(180,180,255,.07)"/>
    </radialGradient>
    <clipPath id="mc${size}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath>
  </defs>
  ${stars}
  <circle cx="${cx}" cy="${cy}" r="${r*1.18}" fill="url(#halo${size})"/>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#mg${size})"/>
  <g clip-path="url(#mc${size})" opacity="0.11">
    <circle cx="${(cx*.77).toFixed(1)}" cy="${(cy*.83).toFixed(1)}" r="${(r*.136).toFixed(1)}" fill="#666"/>
    <circle cx="${(cx*1.17).toFixed(1)}" cy="${(cy*.7).toFixed(1)}" r="${(r*.08).toFixed(1)}" fill="#666"/>
    <circle cx="${(cx*.9).toFixed(1)}" cy="${(cy*1.23).toFixed(1)}" r="${(r*.18).toFixed(1)}" fill="#666"/>
    <circle cx="${(cx*1.3).toFixed(1)}" cy="${(cy*1.1).toFixed(1)}" r="${(r*.114).toFixed(1)}" fill="#666"/>
  </g>
  <g clip-path="url(#mc${size})"><path d="${sp}" fill="#000018" opacity=".93"/></g>
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(196,196,255,.09)" stroke-width="${(size*.01).toFixed(1)}"/>
</svg>`;
}

// ── STARFIELD BG ──
(function(){
  const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
  let W,H,S,P;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;build();}
  function build(){
    S=Array.from({length:160},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.9+.2,a:Math.random(),da:(Math.random()-.5)*.002}));
    P=Array.from({length:20},mk);
  }
  function mk(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.18,vy:-Math.random()*.25-.03,r:Math.random()*1.1+.3,a:Math.random()*.35+.06,l:Math.random()};}
  function draw(){
    ctx.clearRect(0,0,W,H);
    S.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(196,210,255,${s.a*.55})`;ctx.fill();});
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l-=.0014;if(p.l<=0||p.y<-10)Object.assign(p,mk(),{y:H+10});ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,210,255,${Math.min(p.l*2,p.a)})`;ctx.fill();});
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

// ── RENDER ──
const PHASE_AGES=[
  {n:'Luna nueva',       a:.5},
  {n:'Creciente',        a:5},
  {n:'Primer cuarto',    a:7.4},
  {n:'Gibosa creciente', a:11},
  {n:'Luna llena',       a:14.75},
  {n:'Gibosa menguante', a:18.5},
  {n:'Último cuarto',    a:22.1},
  {n:'Menguante',        a:26},
];

// Live icon
const now=new Date(),liveAge=lunarAge(now),liveIllum=illumPct(liveAge),livePhase=lunarPhase(liveAge);
document.getElementById('live-shadow').innerHTML=`<path d="${shadow(liveAge,60,60,44)}" fill="#000018" opacity=".93"/>`;
document.getElementById('live-phase-name').textContent=livePhase.n;
document.getElementById('live-illum-txt').textContent=`${Math.round(liveIllum)}% iluminada`;

// 8 phases grid
const grid=document.getElementById('phases-grid');
PHASE_AGES.forEach(p=>{
  const el=document.createElement('div');
  el.className='phase-item';
  el.innerHTML=`${iconSVG(p.a,64)}<span class="phase-label">${p.n}</span>`;
  grid.appendChild(el);
});

// Sizes
const sizes=[20,32,48,72,96,128,180,512];
const sr=document.getElementById('sizes-row');
sizes.forEach(s=>{
  const el=document.createElement('div');
  el.className='size-item';
  el.innerHTML=`<div style="width:${Math.max(s,20)}px;height:${Math.max(s,20)}px;display:flex;align-items:center;justify-content:center;">${iconSVG(liveAge,s)}</div><span class="size-label">${s}px</span>`;
  sr.appendChild(el);
});
</script>
</body>
</html>
