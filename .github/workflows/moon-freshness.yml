name: Moon freshness

# Regenera a diario el bloque "próxima luna llena" (next-full-moon.html +
# proxima-luna-llena.html) desde data/moons.json + la fecha actual (build.mjs).
# Si cambió, commitea + pushea → Vercel redespliega. Para añadir lunas (2027+):
# edita data/moons.json. Forzar: Actions → Run workflow.

on:
  schedule:
    - cron: '23 6 * * *'   # a diario 06:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: moon-freshness
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate next-full-moon content
        run: node build.mjs
      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "moon-freshness-bot"
            git config user.email "noreply@nextfullmoon.co"
            git add -A
            git commit -m "chore(auto): refrescar 'próxima luna llena' [skip ci]"
            git push
            echo "Pushed refreshed moon content."
          else
            echo "Sin cambios — la próxima luna no ha cambiado."
          fi
